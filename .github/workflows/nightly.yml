name: Nightly Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Setup Apple Certificate (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          if [ -n "$MAC_CERTS" ]; then
            echo "$MAC_CERTS" | base64 --decode > cert.p12
            echo "CSC_LINK=cert.p12" >> $GITHUB_ENV
            echo "CSC_KEY_PASSWORD=$MAC_CERTS_PASSWORD" >> $GITHUB_ENV
          else
            echo "No MAC_CERTS found, skipping code signing."
          fi

      - name: Build Application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly_v${{ github.run_number }}
          name: "🐷 Bản thử nghiệm mới nhất (Nightly v${{ github.run_number }})"
          body: |
            Bản build tự động mới nhất từ nhánh `master`.

            <details>
            <summary>🍏 <b>Dành cho macOS (Chip M1/M2/M3 và Intel)</b></summary>
            
            ⚠️ **Hướng dẫn cài đặt trên macOS (Quan trọng):**
            Vì ứng dụng là dự án mã nguồn mở (không có chứng chỉ trả phí của Apple), macOS có thể sẽ báo lỗi *"App is damaged and can't be opened"* khi bạn mở lần đầu. Để khắc phục, vui lòng làm theo các bước sau:
            
            1. Tải file `.dmg` phù hợp với máy của bạn.
            2. Kéo thả `pig-cleaner.app` vào thư mục **Applications** (Ứng dụng).
            3. Mở ứng dụng **Terminal** trên máy Mac.
            4. Chạy dòng lệnh sau và ấn Enter:
               ```bash
               xattr -cr /Applications/pig-cleaner.app
               ```
            5. Mở ứng dụng và trải nghiệm bình thường!
            </details>

            <details>
            <summary>🪟 <b>Dành cho Windows</b></summary>
            
            - Tải file `.exe` ở dưới và cài đặt bình thường.
            
            ⚠️ **Hướng dẫn bỏ qua màn hình xanh SmartScreen:**
            Vì ứng dụng chưa có chứng chỉ trả phí của Microsoft, Windows sẽ hiện bảng xanh báo động "Windows protected your PC". Để mở app, bạn có 2 cách:
            - **Cách 1 (Nhanh nhất):** Bấm vào dòng chữ **"More info"** (Thêm thông tin), sau đó bấm nút **"Run anyway"** (Vẫn chạy).
            - **Cách 2 (Xoá vĩnh viễn cảnh báo):** Trước khi mở, nhấn chuột phải vào file `.exe` -> Chọn **Properties** (Thuộc tính) -> Ở thẻ General, tick vào ô **Unblock** (Mở khoá) ở dưới cùng -> Nhấn OK.
            </details>
            
            📝 **Dành cho Lập trình viên:**
            Nếu bạn muốn tự custom, chỉnh sửa code và tự đóng gói (build) ứng dụng cho riêng mình, hãy xem hướng dẫn chi tiết tại [Trang chủ dự án (README)](https://github.com/tinyspirits/Pig-cleaner).
          prerelease: true
          files: artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
