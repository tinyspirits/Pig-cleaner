name: Nightly Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Set Build Version
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          npm --no-git-tag-version version $CURRENT_VERSION-nightly.${{ github.run_number }}

      - name: Generate Self-Signed Certificate (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=Developer ID Application: Pig Cleaner (Self-Signed)"
          openssl pkcs12 -export -legacy -out cert.p12 -inkey key.pem -in cert.pem -password pass:dummy
          echo "CSC_LINK=cert.p12" >> $GITHUB_ENV
          echo "CSC_KEY_PASSWORD=dummy" >> $GITHUB_ENV

      - name: Build Application
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Delete old release assets
        uses: mknejp/delete-release-assets@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: nightly
          assets: '*'
          fail-if-no-assets: false
          fail-if-no-release: false

      - name: Update Nightly Tag
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -f nightly
          git push -f origin nightly

      - name: Publish Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "🐷 Bản thử nghiệm mới nhất (Nightly)"
          body: |
            Bản build tự động mới nhất từ nhánh `master`.
            
            ⚠️ **Hướng dẫn cài đặt trên macOS (Quan trọng):**
            Vì ứng dụng là dự án mã nguồn mở (không có chứng chỉ trả phí của Apple), macOS có thể sẽ báo lỗi *"App is damaged and can't be opened"* khi bạn mở lần đầu. Để khắc phục, vui lòng làm theo các bước sau:
            
            1. Kéo thả `pig-cleaner.app` vào thư mục **Applications** (Ứng dụng).
            2. Mở ứng dụng **Terminal** trên máy Mac.
            3. Chạy dòng lệnh sau và ấn Enter:
               ```bash
               xattr -cr /Applications/pig-cleaner.app
               ```
            4. Mở ứng dụng và trải nghiệm bình thường!
            
            📝 **Dành cho Lập trình viên:**
            Nếu bạn muốn tự custom, chỉnh sửa code và tự đóng gói (build) ứng dụng cho riêng mình, hãy xem hướng dẫn chi tiết tại [Trang chủ dự án (README)](https://github.com/tinyspirits/Pig-cleaner).
          prerelease: true
          files: artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
