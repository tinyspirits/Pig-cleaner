name: Nightly Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'LICENSE'
      - 'docs/**'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Setup Apple Certificate (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        env:
          MAC_CERTS: ${{ secrets.MAC_CERTS }}
          MAC_CERTS_PASSWORD: ${{ secrets.MAC_CERTS_PASSWORD }}
        run: |
          if [ -n "$MAC_CERTS" ]; then
            echo "$MAC_CERTS" | base64 --decode > "$GITHUB_WORKSPACE/cert.p12"
            echo "CSC_LINK=$GITHUB_WORKSPACE/cert.p12" >> $GITHUB_ENV
            echo "CSC_KEY_PASSWORD=$MAC_CERTS_PASSWORD" >> $GITHUB_ENV
          else
            echo "No MAC_CERTS found, skipping code signing."
          fi

      - name: Set Custom Build Version
        shell: bash
        run: |
          RUN_NUM=${{ github.run_number }}
          PATCH=$(( (RUN_NUM - 1) / 12 ))
          BUILD=$(( (RUN_NUM - 1) % 12 + 1 ))
          if [ "$PATCH" -ge 13 ]; then
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="1.0.${PATCH}-${BUILD}"
          npm version $NEW_VERSION --no-git-tag-version

      - name: Build Application (Pig-cleaner)
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Application (Character Maker Tool)
        working-directory: ./character-tool
        run: npm install && npm run build:electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Calculate Version
        shell: bash
        run: |
          RUN_NUM=${{ github.run_number }}
          PATCH=$(( (RUN_NUM - 1) / 12 ))
          BUILD=$(( (RUN_NUM - 1) % 12 + 1 ))
          if [ "$PATCH" -ge 13 ]; then
            PATCH=$((PATCH + 1))
          fi
          echo "CUSTOM_VERSION=1.0.${PATCH}-${BUILD}" >> $GITHUB_ENV

      - name: Publish Nightly Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly_v${{ env.CUSTOM_VERSION }}
          name: "🐷 Bản thử nghiệm mới nhất (Nightly v${{ env.CUSTOM_VERSION }})"
          body: |
            Bản build tự động mới nhất từ nhánh `master`.

            <details>
            <summary>🍏 <b>Dành cho macOS (Chip M1/M2/M3 và Intel)</b></summary>
            
            1. Ứng dụng dọn rác chính: `Pig.Cleaner-1.0.x-mac.dmg` (hoặc tương tự)
            2. Ứng dụng hỗ trợ cắt nhân vật: `Character.Maker.Tool-0.0.0-mac.dmg` (hoặc tương tự)

            ⚠️ **Hướng dẫn cài đặt trên macOS (Quan trọng):**
            Sau khi tải file `.dmg` và kéo thả `.app` vào thư mục **Applications** (Ứng dụng), bạn có thể gặp cảnh báo bảo mật. Vui lòng xử lý theo 1 trong 2 trường hợp sau:
            
            **👉 Trường hợp 1: Báo lỗi "Unidentified Developer" (Nhà phát triển không xác định)**
            - Mở **System Settings** (Cài đặt hệ thống) -> **Privacy & Security** (Quyền riêng tư & Bảo mật).
            - Cuộn xuống dưới cùng, tìm dòng chữ báo ứng dụng bị chặn và bấm nút **Open Anyway** (Vẫn mở).
            
            **👉 Trường hợp 2 (Trên macOS đời mới): Báo lỗi "App is damaged..." (App bị hỏng)**
            - Mở ứng dụng **Terminal** trên máy Mac.
            - Chạy dòng lệnh sau và ấn Enter (lệnh này giúp xoá nhãn cách ly an toàn của file tải từ internet, thay tên app tương ứng):
               ```bash
               xattr -cr /Applications/pig-cleaner.app
               xattr -cr "/Applications/Character Maker Tool.app"
               ```
            - Mở lại ứng dụng bình thường!
            </details>

            <details>
            <summary>🪟 <b>Dành cho Windows</b></summary>
            
            1. Ứng dụng dọn rác chính: `Pig.Cleaner... Setup.exe`
            2. Ứng dụng hỗ trợ cắt nhân vật: `Character.Maker.Tool... Setup.exe`

            - Tải file `.exe` ở dưới và cài đặt bình thường.
            
            ⚠️ **Hướng dẫn bỏ qua màn hình xanh SmartScreen:**
            Vì ứng dụng chưa có chứng chỉ trả phí của Microsoft, Windows sẽ hiện bảng xanh báo động "Windows protected your PC". Để mở app, bạn có 2 cách:
            - **Cách 1 (Nhanh nhất):** Bấm vào dòng chữ **"More info"** (Thêm thông tin), sau đó bấm nút **"Run anyway"** (Vẫn chạy).
            - **Cách 2 (Xoá vĩnh viễn cảnh báo):** Trước khi mở, nhấn chuột phải vào file `.exe` -> Chọn **Properties** (Thuộc tính) -> Ở thẻ General, tick vào ô **Unblock** (Mở khoá) ở dưới cùng -> Nhấn OK.
            </details>
            
            📝 **Dành cho Lập trình viên:**
            Nếu bạn muốn tự custom, chỉnh sửa code và tự đóng gói (build) ứng dụng cho riêng mình, hãy xem hướng dẫn chi tiết tại [Trang chủ dự án (README)](https://github.com/tinyspirits/Pig-cleaner).
          prerelease: true
          files: artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
